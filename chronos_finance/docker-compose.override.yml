# Development-only overrides.
#
# Compose auto-merges this file on top of docker-compose.yml.
# → Enables code hot-reload and bind-mounts the source tree.
#
# BEFORE running a long data-sync job, RENAME or DELETE this file so uvicorn
# does not restart in the middle of a multi-hour pull:
#     mv docker-compose.override.yml docker-compose.override.yml.off
#
# Put it back when you want to resume normal development.

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/opt/chronos
