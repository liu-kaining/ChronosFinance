services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chronos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-chronos_finance}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chronos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Inside the docker network the db container always listens on 5432.
      # The POSTGRES_PORT env var in .env is the HOST-side mapping (e.g. 5435)
      # used only when you connect from your laptop to localhost:5435 via
      # DBeaver/psql — it must NOT leak into the API container's DSN.
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

volumes:
  pg_data:
