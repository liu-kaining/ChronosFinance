<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chronos — 数据看板</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --ok: #2ea043;
      --border: #2d3a4d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }
    header span { color: var(--muted); font-size: 0.85rem; }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    nav button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.45rem 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    nav button:hover { border-color: var(--accent); }
    nav button.active {
      background: #243044;
      border-color: var(--accent);
      color: #fff;
    }
    main { padding: 1rem 1.25rem 2rem; max-width: 1200px; margin: 0 auto; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .panel h2 {
      margin: 0 0 0.75rem;
      font-size: 1rem;
      font-weight: 600;
    }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
    input[type="text"], input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    button.primary {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button.primary:hover { filter: brightness(1.08); }
    .err { color: #f85149; font-size: 0.9rem; margin-top: 0.5rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 0.35rem 0.5rem;
      text-align: left;
    }
    th { color: var(--muted); font-weight: 500; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.78rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.65rem;
    }
    .stat {
      background: var(--bg);
      border-radius: 6px;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--border);
    }
    .stat label { display: block; color: var(--muted); font-size: 0.75rem; }
    .stat strong { font-size: 1.1rem; }
    .pill { font-size: 0.7rem; padding: 0.15rem 0.4rem; border-radius: 4px; background: #263041; color: var(--muted); }
    .ok { color: var(--ok); }
    section.tab { display: none; }
    section.tab.visible { display: block; }
    pre {
      margin: 0;
      overflow: auto;
      max-height: 60vh;
      background: var(--bg);
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Chronos 数据看板</h1>
    <span>只读 · 调用现有 <code class="mono">/api/v1/stats/*</code> 与 <code class="mono">/api/v1/data/*</code></span>
    <span style="margin-left:auto"><a href="/library">资料库</a> · <a href="/docs" target="_blank" rel="noopener">OpenAPI /docs</a></span>
  </header>
  <nav id="nav">
    <button type="button" data-tab="overview" class="active">总览</button>
    <button type="button" data-tab="sync">同步进度</button>
    <button type="button" data-tab="universe">标的列表</button>
    <button type="button" data-tab="symbol">单标 inventory</button>
  </nav>
  <main>
    <section id="tab-overview" class="tab visible">
      <div class="panel">
        <h2>库表行数 &amp; Universe</h2>
        <div class="row">
          <button type="button" class="primary" id="btn-overview">刷新</button>
        </div>
        <div id="overview-grid" class="grid"></div>
        <div id="overview-err" class="err"></div>
      </div>
    </section>
    <section id="tab-sync" class="tab">
      <div class="panel">
        <h2>各数据集完成度（active 标的）</h2>
        <div class="row">
          <button type="button" class="primary" id="btn-sync">刷新</button>
        </div>
        <div id="sync-grid" class="grid"></div>
        <div id="sync-err" class="err"></div>
      </div>
    </section>
    <section id="tab-universe" class="tab">
      <div class="panel">
        <h2>stock_universe（分页）</h2>
        <div class="row">
          <label>前缀 <input type="text" id="uni-prefix" placeholder="如 A" maxlength="5" /></label>
          <label>每页 <input type="number" id="uni-limit" value="50" min="1" max="500" /></label>
          <button type="button" class="primary" id="btn-universe">加载</button>
          <button type="button" id="btn-uni-prev">上一页</button>
          <button type="button" id="btn-uni-next">下一页</button>
          <span class="pill" id="uni-meta"></span>
        </div>
        <div style="overflow:auto">
          <table id="uni-table">
            <thead>
              <tr>
                <th>symbol</th>
                <th>company</th>
                <th>income</th>
                <th>prices</th>
                <th>filings</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div id="universe-err" class="err"></div>
      </div>
    </section>
    <section id="tab-symbol" class="tab">
      <div class="panel">
        <h2>单标的汇总（无原始 JSONB）</h2>
        <div class="row">
          <input type="text" id="sym-input" placeholder="如 AAPL" maxlength="20" style="text-transform:uppercase" />
          <button type="button" class="primary" id="btn-symbol">查询</button>
        </div>
        <pre id="symbol-pre" class="mono"></pre>
        <div id="symbol-err" class="err"></div>
      </div>
    </section>
  </main>
  <script>
    async function api(path) {
      const r = await fetch(path, { headers: { Accept: "application/json" } });
      if (!r.ok) throw new Error(r.status + " " + (await r.text()).slice(0, 200));
      return r.json();
    }

    function showTab(name) {
      document.querySelectorAll("section.tab").forEach((s) => s.classList.remove("visible"));
      document.getElementById("tab-" + name).classList.add("visible");
      document.querySelectorAll("#nav button").forEach((b) => b.classList.toggle("active", b.dataset.tab === name));
    }

    document.getElementById("nav").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-tab]");
      if (b) showTab(b.dataset.tab);
    });

    async function loadOverview() {
      const err = document.getElementById("overview-err");
      const grid = document.getElementById("overview-grid");
      err.textContent = "";
      try {
        const d = await api("/api/v1/stats/overview");
        const u = d.universe || {};
        const t = d.tables || {};
        const cells = [
          ["Universe 总数", u.total],
          ["Active", u.active],
          ["Inactive", u.inactive],
          ["static_financials", t.static_financials],
          ["daily_prices", t.daily_prices],
          ["corporate_actions", t.corporate_actions],
          ["earnings_calendar", t.earnings_calendar],
          ["insider_trades", t.insider_trades],
          ["analyst_estimates", t.analyst_estimates],
          ["sec_files", t.sec_files],
          ["macro_economics", t.macro_economics],
        ];
        grid.innerHTML = cells
          .map(
            ([k, v]) =>
              `<div class="stat"><label>${k}</label><strong>${v ?? "—"}</strong></div>`
          )
          .join("");
      } catch (e) {
        err.textContent = String(e.message || e);
      }
    }

    async function loadSync() {
      const err = document.getElementById("sync-err");
      const grid = document.getElementById("sync-grid");
      err.textContent = "";
      try {
        const p = await api("/api/v1/stats/sync-progress");
        const total = p.active_symbols;
        const keys = Object.keys(p).filter((k) => k.startsWith("active_with_"));
        grid.innerHTML = keys
          .map((k) => {
            const n = p[k];
            const ok = total > 0 && n === total;
            const short = k.replace("active_with_", "").replace(/_synced$/, "");
            return `<div class="stat"><label>${short}</label><strong class="${ok ? "ok" : ""}">${n} / ${total}</strong></div>`;
          })
          .join("");
      } catch (e) {
        err.textContent = String(e.message || e);
      }
    }

    let uniOffset = 0;
    async function loadUniverse() {
      const err = document.getElementById("universe-err");
      const tbody = document.querySelector("#uni-table tbody");
      const meta = document.getElementById("uni-meta");
      err.textContent = "";
      const limit = Math.min(500, Math.max(1, parseInt(document.getElementById("uni-limit").value || "50", 10)));
      const prefix = document.getElementById("uni-prefix").value.trim();
      let q = `limit=${limit}&offset=${uniOffset}&active_only=true`;
      if (prefix) q += `&symbol_prefix=${encodeURIComponent(prefix)}`;
      try {
        const d = await api("/api/v1/data/universe?" + q);
        meta.textContent = `total_matching=${d.total_matching} · offset=${d.offset} · limit=${d.limit}`;
        tbody.innerHTML = (d.items || [])
          .map((r) => {
            const yn = (x) => (x ? "✓" : "·");
            return `<tr>
              <td class="mono">${r.symbol}</td>
              <td>${(r.company_name || "").slice(0, 36)}</td>
              <td>${yn(r.income_synced)}</td>
              <td>${yn(r.prices_synced)}</td>
              <td>${yn(r.filings_synced)}</td>
            </tr>`;
          })
          .join("");
      } catch (e) {
        err.textContent = String(e.message || e);
      }
    }

    async function loadSymbol() {
      const err = document.getElementById("symbol-err");
      const pre = document.getElementById("symbol-pre");
      err.textContent = "";
      const sym = document.getElementById("sym-input").value.trim().toUpperCase();
      if (!sym) {
        err.textContent = "请输入 symbol";
        return;
      }
      try {
        const d = await api("/api/v1/data/symbols/" + encodeURIComponent(sym) + "/inventory");
        pre.textContent = JSON.stringify(d, null, 2);
      } catch (e) {
        err.textContent = String(e.message || e);
        pre.textContent = "";
      }
    }

    document.getElementById("btn-overview").addEventListener("click", loadOverview);
    document.getElementById("btn-sync").addEventListener("click", loadSync);
    document.getElementById("btn-universe").addEventListener("click", () => {
      uniOffset = 0;
      loadUniverse();
    });
    document.getElementById("btn-uni-prev").addEventListener("click", () => {
      const limit = Math.min(500, Math.max(1, parseInt(document.getElementById("uni-limit").value || "50", 10)));
      uniOffset = Math.max(0, uniOffset - limit);
      loadUniverse();
    });
    document.getElementById("btn-uni-next").addEventListener("click", () => {
      const limit = Math.min(500, Math.max(1, parseInt(document.getElementById("uni-limit").value || "50", 10)));
      uniOffset += limit;
      loadUniverse();
    });
    document.getElementById("btn-symbol").addEventListener("click", loadSymbol);
    document.getElementById("sym-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadSymbol();
    });

    loadOverview();
    loadSync();
  </script>
</body>
</html>
