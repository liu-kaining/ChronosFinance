events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  # Gzip for static assets
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  upstream api_read_backend {
    server api-read:8000;
    keepalive 32;
  }

  upstream api_write_backend {
    server api-write:8000;
    keepalive 32;
  }

  upstream ai_backend {
    server ai:8100;
    keepalive 16;
  }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---------- API proxy ----------
    # Write side: /api/v1/sync/* + /api/v1/ingest/* -> api-write
    location ~ ^/api/v1/(sync|ingest)(/|$) {
      proxy_pass http://api_write_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_connect_timeout 10s;
      proxy_read_timeout 120s;
    }

    # Read side: everything else under /api/v1/* -> api-read
    location /api/v1/ {
      proxy_pass http://api_read_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_connect_timeout 10s;
      proxy_read_timeout 60s;
    }

    # /api/ai/* → chronos_ai (ai:8100)
    location /api/ai/ {
      proxy_pass http://ai_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_connect_timeout 10s;
      proxy_read_timeout 120s;
      # SSE support
      proxy_buffering off;
      proxy_cache off;
    }

    # ---------- Static assets ----------
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /favicon.svg {
      expires 1d;
    }

    # ---------- SPA fallback ----------
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
