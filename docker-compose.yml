# ChronosFinance — multi-service Docker Compose
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up -d db api   # Start only backend (no web/ai)
#
# Services:
#   db  — PostgreSQL 16
#   api — chronos_finance FastAPI backend (port 8000)
#   web — chronos_web React frontend (nginx, port 80 → mapped to 3000)
#   ai  — chronos_ai AI assistant (port 8100)

services:
  # =========================================================
  # PostgreSQL database
  # =========================================================
  db:
    image: postgres:16-alpine
    container_name: chronos-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chronos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronos_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chronos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chronos} -d ${POSTGRES_DB:-chronos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================================
  # FastAPI backend (chronos_finance)
  # =========================================================
  api:
    build:
      context: ./chronos_finance
      dockerfile: Dockerfile
    container_name: chronos-api
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chronos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronos_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chronos}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FMP_API_KEY: ${FMP_API_KEY}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

  # =========================================================
  # React frontend (chronos_web)
  # =========================================================
  web:
    build:
      context: ./chronos_web
      dockerfile: Dockerfile
    container_name: chronos-web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"
    restart: unless-stopped

  # =========================================================
  # AI service (chronos_ai) — M2.5
  # =========================================================
  ai:
    build:
      context: ./chronos_ai
      dockerfile: Dockerfile
    container_name: chronos-ai
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chronos}:${POSTGRES_PASSWORD:-chronos_secret}@db:5432/${POSTGRES_DB:-chronos}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # LLM provider config — user sets these
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "${AI_PORT:-8100}:8100"
    restart: unless-stopped

volumes:
  postgres_data:
